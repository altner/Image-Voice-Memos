name: Image-Voice-Memos
options:
  bundleIdPrefix: com.adrian-altner
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

schemes:
  Image-Voice-Memos:
    build:
      targets:
        Image-Voice-Memos: all
    run:
      config: Debug

targets:
  Image-Voice-Memos:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Image-Voice-Memos
        excludes:
          - Resources/Info.plist
    info:
      path: Image-Voice-Memos/Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Image Voice Memos needs microphone access to record voice memos for your photos."
        NSSpeechRecognitionUsageDescription: "Image Voice Memos needs speech recognition access to automatically transcribe your voice memos."
        LSMinimumSystemVersion: "15.0"
        LSApplicationCategoryType: "public.app-category.photography"
        CFBundleShortVersionString: "0.1.1"
        CFBundleVersion: "1"
        CFBundleName: "Image Voice Memos"
        NSPrincipalClass: NSApplication
    entitlements:
      path: Image-Voice-Memos/Resources/Image-Voice-Memos.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.audio-input: true
    settings:
      base:
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.adrian-altner.imagevoicememos
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ARCHS: arm64
        EXCLUDED_ARCHS[sdk=macosx*]: x86_64
        INFOPLIST_FILE: Image-Voice-Memos/Resources/Info.plist
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
